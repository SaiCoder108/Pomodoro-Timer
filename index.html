        :root {
            --bg: 244 247 255;
            --panel: 255 255 255;
            --card: 255 255 255;
            --text: 44 51 76;
            --muted: 109 118 145;
            --line: 223 229 247;
            --accent: 120 161 255;
            --accent2: 255 175 188;
            --ok: 125 188 145;

            --bg: 21 23 34;

            --card: 38 42 59;

            --line: 68 73 101;

        }

            font-size: 112.5%;
        }

        .surface {
            background:
                radial-gradient(circle at 15% 10%, rgba(120, 161, 255, 0.16), transparent 35%),
                radial-gradient(circle at 80% 12%, rgba(255, 175, 188, 0.2), transparent 38%),
                radial-gradient(circle at 50% 95%, rgba(125, 188, 145, 0.14), transparent 42%),
                rgb(var(--bg));
        }

        .glass {
            backdrop-filter: blur(12px);
        }

        .progress-track {
            transition: stroke-dashoffset 1s linear;
        }

        .fade-in {
            animation: rise 420ms ease both;
        }

        .lux-loader-backdrop {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 22% 18%, rgba(120, 161, 255, 0.2), transparent 38%),
                radial-gradient(circle at 80% 16%, rgba(255, 175, 188, 0.22), transparent 40%),
                radial-gradient(circle at 50% 86%, rgba(125, 188, 145, 0.18), transparent 45%),
                rgb(var(--bg));
            transition: opacity 420ms ease, visibility 420ms ease;
            opacity: 1;
            visibility: visible;
        }

        .lux-loader-backdrop.is-fading {
            opacity: 0;
            visibility: hidden;
        }

        .lux-loader-card {
            width: min(440px, 88vw);
            border-radius: 1.5rem;
            border: 1px solid rgb(var(--line));
            background: rgb(var(--panel) / 0.85);
            backdrop-filter: blur(14px);
            padding: 1.3rem 1.4rem;
            box-shadow: 0 30px 70px -40px rgba(28, 34, 71, 0.55);
            text-align: center;
        }

        .lux-loader-ring {
            width: 3.2rem;
            height: 3.2rem;
            margin: 0 auto 0.9rem;
            border-radius: 999px;
            border: 3px solid rgb(var(--line));
            border-top-color: rgb(var(--accent));
            border-right-color: rgb(var(--accent2));
            animation: lux-spin 1.1s linear infinite;
        }

        @keyframes lux-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .blink-colon {
            animation: colon-blink 1s steps(1, end) infinite;
        }

        @keyframes colon-blink {

            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0.2;
            }
        }
    </style>
</head>

        const BREAK_IDEAS = [

        function loadState(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return fallback;
                return JSON.parse(raw);
            } catch {
                return fallback;
            }
        }

        function saveState(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function updateThemeFavicon(symbol, colors) {
            const icon = document.getElementById("theme-favicon");
            if (!icon) return;

            const bg = `rgb(${colors.bg})`;
            const accent = `rgb(${colors.accent})`;
            const accent2 = `rgb(${colors.accent2})`;

            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                    <defs>
                        <linearGradient id="themeFaviconGradient" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="${accent}" />
                            <stop offset="100%" stop-color="${accent2}" />
                        </linearGradient>
                    </defs>
                    <rect width="64" height="64" rx="16" fill="${bg}" />
                    <rect x="5" y="5" width="54" height="54" rx="14" fill="url(#themeFaviconGradient)" opacity="0.95" />
                    <text x="32" y="35" font-size="28" text-anchor="middle" dominant-baseline="middle">${symbol}</text>
                </svg>
            `;

            icon.setAttribute("href", `data:image/svg+xml,${encodeURIComponent(svg)}`);
        }

        function pickLoadingLine() {
            const lastIdx = loadState("pp_last_loading_line_idx", -1);
            const pool = LOADING_LINES
                .map((line, idx) => ({ line, idx }))
                .filter((item) => item.idx !== lastIdx);
            const selected = pool[Math.floor(Math.random() * pool.length)] || { line: LOADING_LINES[0], idx: 0 };
            saveState("pp_last_loading_line_idx", selected.idx);
            return selected.line;
        }

        function formatTime(totalSec) {
            const safe = Math.max(0, totalSec);
            const mins = Math.floor(safe / 60)
                .toString()
                .padStart(2, "0");
            const secs = Math.floor(safe % 60)
                .toString()
                .padStart(2, "0");
            return `${mins}:${secs}`;
        }

        function formatHMS(totalSec) {
            const safe = Math.max(0, totalSec);
            const hours = Math.floor(safe / 3600)
                .toString()
                .padStart(2, "0");
            const mins = Math.floor((safe % 3600) / 60)
                .toString()
                .padStart(2, "0");
            const secs = Math.floor(safe % 60)
                .toString()
                .padStart(2, "0");
            return `${hours}:${mins}:${secs}`;
        }

        function formatClock(date) {
            return new Intl.DateTimeFormat(undefined, {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
            }).format(date);
        }

        function getClockParts(date) {
            const hour24 = date.getHours();
            const hours = ((hour24 % 12) || 12).toString().padStart(2, "0");
            const minutes = date.getMinutes().toString().padStart(2, "0");
            const ampm = hour24 >= 12 ? "PM" : "AM";
            return { hours, minutes, ampm };
        }

        function formatDateKey(date) {
            return date.toISOString().slice(0, 10);
        }

        function getSelectedHour24(hour12, isPM) {
            const normalized = hour12 % 12;
            return isPM ? normalized + 12 : normalized;
        }

        function getSecondsUntilTodayTarget(hour12, minute, isPM) {
            const now = new Date();
            const target = new Date(now);
            target.setHours(getSelectedHour24(hour12, isPM), minute, 0, 0);
            return Math.floor((target - now) / 1000);
        }

        function pickCountdownQuote() {
            const lastIdx = loadState("pp_last_countdown_quote_idx", -1);
            const pool = COUNTDOWN_QUOTES
                .map((quote, idx) => ({ quote, idx }))
                .filter((item) => item.idx !== lastIdx);
            const selected = pool[Math.floor(Math.random() * pool.length)] || { quote: COUNTDOWN_QUOTES[0], idx: 0 };
            saveState("pp_last_countdown_quote_idx", selected.idx);
            return selected.quote;
        }

        function playSoftBeep() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;
            const ctx = new AudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.value = 690;
            gain.gain.setValueAtTime(0.0001, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.07, ctx.currentTime + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.38);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
        }

        function App() {
            const [isBooting, setIsBooting] = useState(true);

                    restMinutes: 5,
                    autoStartNext: false,
                })

            const [phase, setPhase] = useState("work");

            const [durationSec, setDurationSec] = useState(settings.workMinutes * 60);
            const [remainingSec, setRemainingSec] = useState(settings.workMinutes * 60);

            const [clockNow, setClockNow] = useState(new Date());
            const [countdownHour, setCountdownHour] = useState(11);
            const [countdownMinute, setCountdownMinute] = useState(59);
            const [countdownIsPM, setCountdownIsPM] = useState(true);
            const [isCountdownRunning, setIsCountdownRunning] = useState(false);
            const [isCountdownEditing, setIsCountdownEditing] = useState(true);
            const [countdownInitialSec, setCountdownInitialSec] = useState(0);
            const [countdownRemainingSec, setCountdownRemainingSec] = useState(0);
            const [countdownQuote, setCountdownQuote] = useState(() => pickCountdownQuote());
            const [countdownError, setCountdownError] = useState("");
            const [activeCountdownHand, setActiveCountdownHand] = useState(null);
            const analogClockRef = useRef(null);

            const [taskError, setTaskError] = useState("");
            const [taskInput, setTaskInput] = useState("");
            const [tasks, setTasks] = useState(() => loadState("pp_manual_tasks", []));
            const [showCompleted, setShowCompleted] = useState(false);
            const [breakIdea, setBreakIdea] = useState("Take a short walk outside.");

            const [history, setHistory] = useState(() => loadState("pp_history", {}));

            const todayKey = formatDateKey(new Date());
            const completedToday = history[todayKey] || 0;
            const activeTheme = THEME_PRESETS[themePresetIndex] || THEME_PRESETS[0];

            useEffect(() => {
                Object.entries(activeTheme.colors).forEach(([token, value]) => {
                    document.documentElement.style.setProperty(`--${token}`, value);
                });
                updateThemeFavicon(activeTheme.symbol, activeTheme.colors);
                saveState("pp_theme_preset_id", activeTheme.id);
            }, [activeTheme]);

            useEffect(() => {
                const fadeTimer = setTimeout(() => setIsBootFading(true), 1100);
                const doneTimer = setTimeout(() => setIsBooting(false), 1650);
                return () => {
                    clearTimeout(fadeTimer);
                    clearTimeout(doneTimer);
                };
            }, []);

            useEffect(() => {
                saveState("pp_settings", settings);
            }, [settings]);

            useEffect(() => {
                saveState("pp_history", history);
            }, [history]);

            useEffect(() => {
                saveState("pp_manual_tasks", tasks);
            }, [tasks]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setClockNow(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!isCountdownRunning) return;
                const timer = setInterval(() => {
                    setCountdownRemainingSec((prev) => {
                        if (prev > 1) return prev - 1;
                        playSoftBeep();
                        setIsCountdownRunning(false);
                        return 0;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isCountdownRunning]);

            useEffect(() => {
                const handlePointerUp = () => setActiveCountdownHand(null);
                window.addEventListener("pointerup", handlePointerUp);
                return () => window.removeEventListener("pointerup", handlePointerUp);
            }, []);

            useEffect(() => {
                if (!isRunning) return;
                const timer = setInterval(() => {
                    setRemainingSec((prev) => {
                        if (prev > 1) return prev - 1;
                        playSoftBeep();
                        if (phase === "work") {
                            const key = formatDateKey(new Date());
                            setHistory((h) => ({ ...h, [key]: (h[key] || 0) + 1 }));
                        }

                        const nextPhase = phase === "work" ? "rest" : "work";
                        const nextDuration =
                            nextPhase === "work"
                                ? Math.max(1, settings.workMinutes) * 60
                                : Math.max(1, settings.restMinutes) * 60;

                        setPhase(nextPhase);
                        setDurationSec(nextDuration);
                        if (!settings.autoStartNext) {
                            setIsRunning(false);
                        }
                        return nextDuration;
                    });
                }, 1000);

                return () => clearInterval(timer);
            }, [isRunning, phase, settings.workMinutes, settings.restMinutes, settings.autoStartNext]);

            function applyPreset(work, rest) {
                const safeWork = Math.max(1, Number(work) || 25);
                const safeRest = Math.max(1, Number(rest) || 5);
                setSettings((s) => ({ ...s, workMinutes: safeWork, restMinutes: safeRest }));
                if (phase === "work") {
                    setDurationSec(safeWork * 60);
                    setRemainingSec(safeWork * 60);
                } else {
                    setDurationSec(safeRest * 60);
                    setRemainingSec(safeRest * 60);
                }
                setIsRunning(false);
            }

            function toggleThemeAndCyclePreset() {
                setThemePresetIndex((prev) => (prev + 1) % THEME_PRESETS.length);
            }

            function resetTimer() {
                const d = phase === "work" ? settings.workMinutes * 60 : settings.restMinutes * 60;
                setDurationSec(d);
                setRemainingSec(d);
                setIsRunning(false);
            }

            function pickRandomBreak() {
                const options = BREAK_IDEAS.filter((idea) => idea !== breakIdea);
                const pool = options.length > 0 ? options : BREAK_IDEAS;
                const random = pool[Math.floor(Math.random() * pool.length)];
                setBreakIdea(random);
            }

            function updateClockHandFromPointer(event, handType) {
                if (!analogClockRef.current) return;
                const rect = analogClockRef.current.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = event.clientX - cx;
                const dy = event.clientY - cy;

                    setCountdownHour(hour12);

                                            <div className="mt-4 flex flex-wrap items-center justify-center gap-2">
                                                <button
                                                    onClick={() => setCountdownIsPM(false)}
                                                    className={`rounded-lg border px-3 py-1.5 text-sm font-semibold transition ${!countdownIsPM
                                                        ? "border-accent bg-accent text-white"
                                                        : "border-line bg-panel text-muted hover:bg-bg"
                                                        }`}
                                                >
                                                    AM
                                                </button>
                                                <button
                                                    onClick={() => setCountdownIsPM(true)}
                                                    className={`rounded-lg border px-3 py-1.5 text-sm font-semibold transition ${countdownIsPM
                                                        ? "border-accent bg-accent text-white"
                                                        : "border-line bg-panel text-muted hover:bg-bg"
                                                        }`}
                                                >
                                                    PM
                                                </button>
                                            </div>

                                            <p className="mt-3 text-center font-serif text-3xl">
                                                {String(countdownHour).padStart(2, "0")}:{String(countdownMinute).padStart(2, "0")} {countdownIsPM ? "PM" : "AM"}
                                            </p>
                                            <p className="mt-1 text-center text-xs text-muted">Latest target is end of day (11:59 PM).</p>
                                        </div>

                                        <div className="grid place-items-center text-center">
                                            <div className="w-full max-w-lg space-y-6">
                                                <p className="text-sm uppercase tracking-widest text-muted">Custom Countdown</p>
                                                <p className="font-serif text-5xl sm:text-7xl">{countdownDisplayTime}</p>
                                                <div className="h-3 overflow-hidden rounded-full bg-line">
                                                    <div
                                                        className="h-full rounded-full bg-gradient-to-r from-accent to-accent2 transition-all duration-1000"
                                                        style={{ width: `${Math.min(100, Math.max(0, hasCountdownStarted ? countdownProgress * 100 : 0))}%` }}
                                                    />
                                                </div>
                                                <p className="text-sm text-muted">{countdownQuote}</p>

                                                {countdownError && <p className="text-sm text-red-500">{countdownError}</p>}

                                                <div className="flex flex-wrap justify-center gap-2">
                                                    <button
                                                        onClick={startCustomCountdown}
                                                        className="rounded-xl bg-accent px-5 py-2.5 font-semibold text-white transition hover:brightness-110"
                                                    >
                                                        Start Countdown
                                                    </button>
                                                    {hasCountdownStarted && (
                                                        <button
                                                            onClick={stopCustomCountdown}
                                                            className="rounded-xl border border-line bg-card px-5 py-2.5 font-semibold text-text transition hover:bg-bg"
                                                        >
                                                            Stop
                                                        </button>
                                                    )}
                                                </div>

                                                {!isCountdownRunning && countdownPreviewSec <= 0 && (
                                                    <p className="text-xs text-muted">That time has already passed today. Pick a later time.</p>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid min-h-[420px] place-items-center text-center">
                                        <div className="w-full max-w-xl space-y-6">
                                            <p className="text-sm uppercase tracking-widest text-muted">Custom Countdown</p>
                                            <p className="font-serif text-6xl sm:text-8xl">{countdownDisplayTime}</p>
                                            <div className="h-3 overflow-hidden rounded-full bg-line">
                                                <div
                                                    className="h-full rounded-full bg-gradient-to-r from-accent to-accent2 transition-all duration-1000"
                                                    style={{ width: `${Math.min(100, Math.max(0, hasCountdownStarted ? countdownProgress * 100 : 0))}%` }}
                                                />
                                            </div>
                                            <p className="text-sm text-muted">{countdownQuote}</p>
                                            <button
                                                onClick={editCustomCountdown}
                                                className="rounded-lg border border-line bg-card px-3 py-1.5 text-xs font-semibold text-muted transition hover:bg-bg"
                                            >
                                                Edit target time
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </article>
                        )}

                    </div>
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
